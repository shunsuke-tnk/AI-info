<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&family=Inter:wght@700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
  }

  .container {
    width: 1200px;
    height: 630px;
    background: linear-gradient(135deg, #1e1b4b 0%, #4338CA 30%, #6D28D9 60%, #BE185D 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 80px 90px;
    position: relative;
    overflow: hidden;
  }

  .container::before {
    content: '';
    position: absolute;
    top: -100px;
    right: -100px;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: rgba(255,255,255,0.03);
  }

  .container::after {
    content: '';
    position: absolute;
    bottom: -150px;
    left: -50px;
    width: 400px;
    height: 400px;
    border-radius: 50%;
    background: rgba(255,255,255,0.02);
  }

  .category {
    font-family: 'Inter', sans-serif;
    font-weight: 800;
    font-size: 20px;
    color: rgba(255,255,255,0.6);
    text-transform: uppercase;
    letter-spacing: 3px;
    margin-bottom: 28px;
    position: relative;
    z-index: 1;
  }

  .title {
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 900;
    font-size: 72px;
    color: #ffffff;
    line-height: 1.35;
    max-width: 1020px;
    position: relative;
    z-index: 1;
    word-break: auto-phrase;
    overflow-wrap: break-word;
  }

  .divider {
    width: 80px;
    height: 4px;
    background: rgba(255,255,255,0.4);
    border-radius: 2px;
    margin-top: 32px;
    position: relative;
    z-index: 1;
  }

  .site-name {
    position: absolute;
    bottom: 40px;
    right: 60px;
    font-family: 'Inter', sans-serif;
    font-weight: 700;
    font-size: 20px;
    color: rgba(255,255,255,0.35);
    letter-spacing: 2px;
    z-index: 1;
  }
</style>
</head>
<body>
  <div class="container">
    <div class="category">{{CATEGORY}}</div>
    <div class="title">{{TITLE}}</div>
    <div class="divider"></div>
    <div class="site-name">AI Shelf</div>
  </div>
</body>
</html>
